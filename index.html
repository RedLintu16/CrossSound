<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CrossSound</title>
</head>
<body>

<link rel="stylesheet" href="styles/main/styles.css">
<div id="theme-notification">Theme Loaded!</div>

<div id="themes-overlay">
  <div id="themes-panel">
    <h2>Themes</h2>
    <div id="themes-panel-list"></div>
    <div class="themes-actions">
      <button id="themes-load-btn" class="service-btn" type="button">Load Theme</button>
      <button id="themes-default-btn" class="service-btn" type="button">Default Theme</button>
      <button id="themes-close-btn">Close</button>
    </div>
  </div>
</div>

<div id="settings-overlay">
  <div id="settings-panel">
    <h2>Settings</h2>

    <div class="settings-section">
      <h3>Notifications</h3>
      <label class="toggle-row">
        <input type="checkbox" id="setting-notifications">
        <span>Enable notifications</span>
      </label>
    </div>

    <div class="settings-section">
      <h3>Hotkeys</h3>
      <div class="hotkey-row">
        <span>Play / Pause</span>
        <div class="hotkey-input-wrap">
          <input type="text" id="hotkey-playpause" readonly placeholder="Click to set…">
          <button class="hotkey-clear" data-target="hotkey-playpause">×</button>
        </div>
      </div>
      <div class="hotkey-row">
        <span>Next Track</span>
        <div class="hotkey-input-wrap">
          <input type="text" id="hotkey-next" readonly placeholder="Click to set…">
          <button class="hotkey-clear" data-target="hotkey-next">×</button>
        </div>
      </div>
      <div class="hotkey-row">
        <span>Previous Track</span>
        <div class="hotkey-input-wrap">
          <input type="text" id="hotkey-previous" readonly placeholder="Click to set…">
          <button class="hotkey-clear" data-target="hotkey-previous">×</button>
        </div>
      </div>
      <div class="hotkey-row">
        <span>Like / Unlike</span>
        <div class="hotkey-input-wrap">
          <input type="text" id="hotkey-like" readonly placeholder="Click to set…">
          <button class="hotkey-clear" data-target="hotkey-like">×</button>
        </div>
      </div>
    </div>

    <div class="settings-section">
      <h3>Discord Rich Presence</h3>
      <label class="toggle-row">
        <input type="checkbox" id="setting-discord-rpc">
        <span>Enable Discord Rich Presence</span>
      </label>
    </div>

    <div class="settings-section">
      <h3>Last.FM Scrobbling</h3>
      <label class="toggle-row">
        <input type="checkbox" id="setting-lastfm-enabled">
        <span>Enable Last.FM Scrobbling</span>
      </label>
      <div class="hotkey-row">
        <span>API Key</span>
        <input type="text" id="setting-lastfm-api-key" class="text-input" placeholder="Your Last.FM API Key">
      </div>
      <div class="hotkey-row">
        <span>API Secret</span>
        <input type="text" id="setting-lastfm-api-secret" class="text-input" placeholder="Your Last.FM API Secret">
      </div>
      <div id="lastfm-auth-actions">
        <button id="lastfm-connect-btn" class="service-btn" type="button">Connect to Last.FM</button>
      </div>
      <div id="lastfm-auth-status"></div>
      <div id="lastfm-complete-auth" style="display:none;">
        <p class="settings-hint">Authorize CrossSound on Last.FM in your browser, then click Complete Login.</p>
        <button id="lastfm-complete-btn" class="service-btn" type="button">Complete Login</button>
      </div>
    </div>

    <div class="settings-actions">
      <button id="settings-cancel">Cancel</button>
      <button id="settings-save">Save</button>
    </div>
  </div>
</div>

  <div id="nav-bar">
    <button id="nav-back" title="Back">&#8592;</button>
    <button id="nav-forward" title="Forward">&#8594;</button>
    <button id="themesbutton" title="Themes">
